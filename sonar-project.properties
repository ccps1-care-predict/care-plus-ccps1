sonar.projectKey=care-plus
sonar.projectName=Care Plus Monorepo
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8
sonar.sources=modules

# Keep analysis focused on production source code and avoid heavy/generated artifacts.
sonar.exclusions=**/.git/**,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.angular/**,**/.scannerwork/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.csv,**/tests/**,**/*test*/**,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.test.js,**/test_*.py

# Ensure SonarJS uses a compatible TS config (avoids module=preserve incompatibility).
sonar.typescript.tsconfigPaths=modules/spa/tsconfig.sonar.json

# Improves Python rule precision by avoiding mixed Py2/Py3 fallback analysis.
sonar.python.version=3.10

# This repository is a submodule aggregator; SCM blame is unreliable at this level.
sonar.scm.disabled=true
