include:
  - path: ./modules/api/docker-compose.yml
  - path: ./modules/services/public-health-ingestion-service/docker-compose.yml

services:
  frontend-angular:
    build:
      context: ./modules/spa
      dockerfile: Dockerfile.yml
      args:
        SPA_BUILD_CONFIGURATION: ${SPA_BUILD_CONFIGURATION:-docker}
    container_name: care_plus_spa
    ports:
      - "4200:4200"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  data-worker-etl:
    build:
      context: ./modules/data/data-worker-etl
    container_name: data-worker-etl
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/care_plus
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_RAW: careplus-raw
      MINIO_SECURE: "false"
      ETL_SOURCES: sinan,sinasc,sim,sih,sia,cnes,ibge
      ETL_INTERVAL_SECONDS: "86400"
      ETL_ENABLE_LOOP: "false"
    restart: unless-stopped
