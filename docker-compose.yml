name: carepredict

# MVP executavel com os modulos atualmente implementados no repositorio.
# Fluxo local: frontend + api + postgres + redis + minio (batch only, sem cloud deps).

networks:
  carepredict-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  spa_node_modules:

services:
  db:
    image: postgres:16-alpine
    container_name: carepredict-postgres
    restart: unless-stopped
    networks:
      - carepredict-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-care_plus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-care_plus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carepredict-redis
    restart: unless-stopped
    networks:
      - carepredict-net
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: carepredict-minio
    restart: unless-stopped
    networks:
      - carepredict-net
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: carepredict-minio-init
    restart: "no"
    networks:
      - carepredict-net
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123}; do
        echo 'Aguardando MinIO...'; sleep 2;
      done;
      mc mb -p local/raw || true;
      mc mb -p local/processed || true;
      mc mb -p local/curated || true;
      mc mb -p local/wearables-raw || true;
      mc mb -p local/wearables-features || true;
      echo 'Buckets do MVP inicializados.';
      "

  # Servicos adicionais do MVP (scaffold)
  # Subir com: docker compose --profile full-mvp up --build

  ml-inference-service:
    build:
      context: ./modules/ml/ml-inference-service
      dockerfile: Dockerfile
    container_name: carepredict-ml-inference
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  wearable-mock-apis:
    build:
      context: ./modules/services/wearable-mock-apis
      dockerfile: Dockerfile
    container_name: carepredict-wearable-mock
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  wearable-connector:
    build:
      context: ./modules/services/wearable-connector
      dockerfile: Dockerfile
    container_name: carepredict-wearable-connector
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      WEARABLE_MOCK_URL: http://wearable-mock-apis:8003
      OAUTH_MOCK_MODE: "true"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-care_plus}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      wearable-mock-apis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  wearable-sync-worker:
    build:
      context: ./modules/services/wearable-sync-worker
      dockerfile: Dockerfile
    container_name: carepredict-wearable-sync-worker
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    environment:
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-3600}
      WEARABLE_CONNECTOR_URL: http://wearable-connector:8002
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-care_plus}
      MINIO_URL: http://minio:9000
    depends_on:
      wearable-connector:
        condition: service_healthy
      db:
        condition: service_healthy
      minio:
        condition: service_started

  risk-scoring-engine:
    build:
      context: ./modules/services/risk-scoring-engine
      dockerfile: Dockerfile
    container_name: carepredict-risk-scoring
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      ML_SERVICE_URL: http://ml-inference-service:8001
    depends_on:
      ml-inference-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  clinical-guidelines-validator:
    build:
      context: ./modules/services/clinical-guidelines-validator
      dockerfile: Dockerfile
    container_name: carepredict-clinical-validator
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8007:8007"
    environment:
      PORT: 8007
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  recommendation-engine:
    build:
      context: ./modules/services/recommendation-engine
      dockerfile: Dockerfile
    container_name: carepredict-recommendation-engine
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8005:8005"
    environment:
      PORT: 8005
      RISK_ENGINE_URL: http://risk-scoring-engine:8004
      CLINICAL_VALIDATOR_URL: http://clinical-guidelines-validator:8007
    depends_on:
      risk-scoring-engine:
        condition: service_healthy
      clinical-guidelines-validator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  scheduling-service:
    build:
      context: ./modules/services/scheduling-service
      dockerfile: Dockerfile
    container_name: carepredict-scheduling-service
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8006:8006"
    environment:
      PORT: 8006
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-care_plus}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  population-data-service:
    build:
      context: ./modules/services/population-data-service
      dockerfile: Dockerfile
    container_name: carepredict-population-data
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    ports:
      - "8008:8008"
    environment:
      PORT: 8008
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  data-worker-etl:
    build:
      context: ./modules/data/data-worker-etl
      dockerfile: Dockerfile
    container_name: carepredict-data-worker-etl
    restart: unless-stopped
    profiles:
      - full-mvp
    networks:
      - carepredict-net
    environment:
      ETL_INTERVAL_SECONDS: ${ETL_INTERVAL_SECONDS:-86400}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-care_plus}
      MINIO_URL: http://minio:9000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  backend-api:
    image: python:3.12-slim
    container_name: carepredict-api
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn src.main:app --host 0.0.0.0 --port 8080 --reload"
    restart: unless-stopped
    networks:
      - carepredict-net
    volumes:
      - ./modules/api:/app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-care_plus}
      DEBUG: ${API_DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend-angular:
    image: node:22-alpine
    container_name: carepredict-frontend
    working_dir: /app
    command: >
      sh -c "npm ci && npm run start -- --host 0.0.0.0 --port 4200"
    restart: unless-stopped
    networks:
      - carepredict-net
    volumes:
      - ./modules/spa:/app
      - spa_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    environment:
      API_URL: http://localhost:8080
    depends_on:
      backend-api:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: carepredict-pgadmin
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - carepredict-net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@carepredict.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy
