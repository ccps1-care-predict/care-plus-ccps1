name: 🧪 E2E Tests — Connector App

on:
  push:
    branches: [main, develop]
    paths:
      - 'modules/connector-app/**'
      - '.github/workflows/e2e_tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'modules/connector-app/**'

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: macos-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - auth_e2e_test
          - dashboard_e2e_test
          - wearables_e2e_test
          - recommendations_e2e_test
          - scheduling_e2e_test
          - notifications_e2e_test
          - offline_mode_e2e_test

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.12.0'
          channel: 'stable'

      - name: 📦 Get Dependencies
        working-directory: modules/connector-app
        run: |
          flutter clean
          flutter pub get

      - name: 🧪 Run E2E Test Suite - ${{ matrix.test-suite }}
        working-directory: modules/connector-app
        run: |
          flutter test \
            integration_test/${{ matrix.test-suite }}.dart \
            --verbose \
            --timeout 300000 \
            --dart-define=INTEGRATION_TEST=true
        continue-on-error: true

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.test-suite }}
          path: modules/connector-app/test-results/
          retention-days: 30

  coverage:
    name: Generate Coverage Report
    runs-on: macos-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.12.0'
          channel: 'stable'

      - name: 📦 Get Dependencies
        working-directory: modules/connector-app
        run: |
          flutter clean
          flutter pub get

      - name: 📈 Generate Coverage
        working-directory: modules/connector-app
        run: |
          flutter test --coverage integration_test/ \
            --dart-define=INTEGRATION_TEST=true
        continue-on-error: true

      - name: 📤 Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./modules/connector-app/coverage/lcov.info
          flags: e2e-tests
          name: connector-app-e2e
          fail_ci_if_error: false

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.12.0'
          channel: 'stable'

      - name: 📦 Get Dependencies
        working-directory: modules/connector-app
        run: |
          flutter clean
          flutter pub get

      - name: 🔍 Analyze
        working-directory: modules/connector-app
        run: flutter analyze

      - name: 📝 Format Check
        working-directory: modules/connector-app
        run: dart format --set-exit-if-changed integration_test/ lib/

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-tests, coverage, lint]
    if: always()

    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## 🧪 E2E Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ auth_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ dashboard_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ wearables_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ recommendations_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ scheduling_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ notifications_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ offline_mode_e2e_test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Tests: 70" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage Report**: Available in Artifacts" >> $GITHUB_STEP_SUMMARY

      - name: ✅ Completion Status
        if: needs.e2e-tests.result == 'success' && needs.lint.result == 'success'
        run: echo "All E2E tests passed successfully! ✓"

      - name: ❌ Failure Notice
        if: needs.e2e-tests.result != 'success' || needs.lint.result != 'success'
        run: |
          echo "Some tests failed. Check the logs above."
          exit 1
